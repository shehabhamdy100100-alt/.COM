<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>الآلة الحاسبة</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="calculator">
        <div class="header">
            <h1>ولا يا حرامي ... أنا يتيم</h1>
        </div>
        
        <div class="display">
            <div class="history" id="history"></div>
            <div class="current" id="display">0</div>
        </div>
        
        <button class="backspace" id="backspace">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path>
                <line x1="18" y1="9" x2="12" y2="15"></line>
                <line x1="12" y1="9" x2="18" y2="15"></line>
            </svg>
            <span>مسح رقم</span>
        </button>
        
        <div class="buttons">
            <button class="btn btn-red" data-action="clear">C</button>
            <button class="btn btn-gray" data-action="toggle">±</button>
            <button class="btn btn-gray" data-action="percent">%</button>
            <button class="btn btn-orange" data-action="operator" data-value="÷">÷</button>
            
            <button class="btn btn-dark" data-action="digit" data-value="7">7</button>
            <button class="btn btn-dark" data-action="digit" data-value="8">8</button>
            <button class="btn btn-dark" data-action="digit" data-value="9">9</button>
            <button class="btn btn-orange" data-action="operator" data-value="×">×</button>
            
            <button class="btn btn-dark" data-action="digit" data-value="4">4</button>
            <button class="btn btn-dark" data-action="digit" data-value="5">5</button>
            <button class="btn btn-dark" data-action="digit" data-value="6">6</button>
            <button class="btn btn-orange" data-action="operator" data-value="-">−</button>
            
            <button class="btn btn-dark" data-action="digit" data-value="1">1</button>
            <button class="btn btn-dark" data-action="digit" data-value="2">2</button>
            <button class="btn btn-dark" data-action="digit" data-value="3">3</button>
            <button class="btn btn-orange" data-action="operator" data-value="+">+</button>
            
            <button class="btn btn-dark span-2" data-action="digit" data-value="0">0</button>
            <button class="btn btn-dark" data-action="decimal">.</button>
            <button class="btn btn-green" data-action="equals">=</button>
        </div>
        
        <p class="hint">💡 يمكنك استخدام لوحة المفاتيح للكتابة</p>
    </div>
    
    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | MultiSystem</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 20px 40px;
            position: relative;
        }

        .login-card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 50px 40px;
            width: 100%;
            max-width: 480px;
            backdrop-filter: blur(12px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            animation: float 6s ease-in-out infinite;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header h2 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .form-control {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .form-control::placeholder {
            color: var(--text-muted);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
            color: var(--text-muted);
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }

        .divider span {
            padding: 0 15px;
            font-size: 0.9rem;
        }

        .social-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            font-size: 1rem;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .login-footer {
            text-align: center;
            margin-top: 30px;
            color: var(--text-secondary);
        }

        .login-footer a {
            color: var(--primary-color);
            font-weight: 600;
            transition: color 0.3s;
        }

        .login-footer a:hover {
            color: var(--secondary-color);
        }

        .forgot-password {
            display: block;
            text-align: left;
            margin-top: 10px;
            font-size: 0.9rem;
            color: var(--primary-color);
        }

        .forgot-password:hover {
            color: var(--secondary-color);
        }

        @media (max-width: 768px) {
            .login-card {
                padding: 40px 25px;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header id="header" class="scrolled">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-chart-pie text-gradient"></i>
                <span class="text-gradient">MultiSystem</span>
            </a>
            <div class="nav-actions">
                <a href="index.html" class="btn btn-outline">العودة للرئيسية</a>
            </div>
        </div>
    </header>

    <div class="login-page">
        <div class="login-card">
            <div class="login-header">
                <h2>مرحباً بك مجدداً</h2>
                <p>سجل دخولك لمتابعة أعمالك وحساباتك</p>
            </div>

            <form action="#" method="POST" onsubmit="event.preventDefault(); alert('تم تسجيل الدخول بنجاح!'); window.location.href='index.html';">
                <div class="form-group">
                    <label for="email">البريد الإلكتروني</label>
                    <input type="email" id="email" class="form-control" placeholder="name@company.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">كلمة المرور</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    <a href="#" class="forgot-password">هل نسيت كلمة المرور؟</a>
                </div>

                <button type="submit" class="btn btn-primary login-btn">تسجيل الدخول</button>
            </form>

            <div class="divider">
                <span>أو الدخول باستخدام</span>
            </div>

            <button class="social-btn" onclick="alert('جاري تسجيل الدخول بحساب جوجل...');">
                <i class="fa-brands fa-google text-gradient" style="font-size: 1.2rem;"></i>
                جوجل (Google)
            </button>

            <div class="login-footer">
                ليس لديك حساب؟ <a href="index.html#pricing">اشترك الآن</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
